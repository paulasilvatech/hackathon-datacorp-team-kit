<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <rect width="1200" height="420" fill="#fef2f2"/>
  <text x="600" y="46" text-anchor="middle" font-size="24" font-weight="700" fill="#7f1d1d">Why SIFAP must change: 5 pain points that block the business</text>
  <text x="600" y="72" text-anchor="middle" font-size="14" fill="#991b1b">Every pain point is an opportunity for your team to create value</text>

  <g transform="translate(40,110)">
    <rect width="210" height="260" rx="12" fill="#fff" stroke="#fecaca" stroke-width="2"/>
    <circle cx="105" cy="50" r="26" fill="#dc2626"/>
    <text x="105" y="58" text-anchor="middle" font-size="22" font-weight="700" fill="#fff">1</text>
    <text x="105" y="110" text-anchor="middle" font-size="15" font-weight="700" fill="#7f1d1d">Knowledge silos</text>
    <foreignObject x="16" y="130" width="180" height="120">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font:12px system-ui;color:#991b1b;text-align:center;line-height:1.45">
        Only 3 people know how the payment batch works. If one leaves, the whole team is stuck.
      </div>
    </foreignObject>
  </g>

  <g transform="translate(270,110)">
    <rect width="210" height="260" rx="12" fill="#fff" stroke="#fecaca" stroke-width="2"/>
    <circle cx="105" cy="50" r="26" fill="#dc2626"/>
    <text x="105" y="58" text-anchor="middle" font-size="22" font-weight="700" fill="#fff">2</text>
    <text x="105" y="110" text-anchor="middle" font-size="15" font-weight="700" fill="#7f1d1d">Cryptic code</text>
    <foreignObject x="16" y="130" width="180" height="120">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font:12px system-ui;color:#991b1b;text-align:center;line-height:1.45">
        Natural programs use 8 character names like CALCBENF. Abbreviations nobody remembers the meaning of.
      </div>
    </foreignObject>
  </g>

  <g transform="translate(500,110)">
    <rect width="210" height="260" rx="12" fill="#fff" stroke="#fecaca" stroke-width="2"/>
    <circle cx="105" cy="50" r="26" fill="#dc2626"/>
    <text x="105" y="58" text-anchor="middle" font-size="22" font-weight="700" fill="#fff">3</text>
    <text x="105" y="110" text-anchor="middle" font-size="15" font-weight="700" fill="#7f1d1d">Zero tests</text>
    <foreignObject x="16" y="130" width="180" height="120">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font:12px system-ui;color:#991b1b;text-align:center;line-height:1.45">
        Every change is a gamble. A rule added in 2007 could silently break a calculation from 1999.
      </div>
    </foreignObject>
  </g>

  <g transform="translate(730,110)">
    <rect width="210" height="260" rx="12" fill="#fff" stroke="#fecaca" stroke-width="2"/>
    <circle cx="105" cy="50" r="26" fill="#dc2626"/>
    <text x="105" y="58" text-anchor="middle" font-size="22" font-weight="700" fill="#fff">4</text>
    <text x="105" y="110" text-anchor="middle" font-size="15" font-weight="700" fill="#7f1d1d">Costly licenses</text>
    <foreignObject x="16" y="130" width="180" height="120">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font:12px system-ui;color:#991b1b;text-align:center;line-height:1.45">
        Mainframe licenses cost millions per year. Budget that should go to innovation pays for maintenance.
      </div>
    </foreignObject>
  </g>

  <g transform="translate(960,110)">
    <rect width="210" height="260" rx="12" fill="#fff" stroke="#fecaca" stroke-width="2"/>
    <circle cx="105" cy="50" r="26" fill="#dc2626"/>
    <text x="105" y="58" text-anchor="middle" font-size="22" font-weight="700" fill="#fff">5</text>
    <text x="105" y="110" text-anchor="middle" font-size="15" font-weight="700" fill="#7f1d1d">No integrations</text>
    <foreignObject x="16" y="130" width="180" height="120">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font:12px system-ui;color:#991b1b;text-align:center;line-height:1.45">
        Citizens cannot check benefits from a mobile app. Every integration needs a custom adapter.
      </div>
    </foreignObject>
  </g>
</svg>

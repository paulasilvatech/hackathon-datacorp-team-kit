<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <rect width="1200" height="440" fill="#ffffff"/>
  <text x="600" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Architecture transformation: from mainframe silos to cloud native</text>

  <g transform="translate(40,80)">
    <rect width="500" height="320" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="250" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#92400e">BEFORE: SIFAP legacy (1995)</text>

    <rect x="30" y="60" width="440" height="60" rx="8" fill="#fff" stroke="#d97706"/>
    <text x="250" y="96" text-anchor="middle" font-size="13" fill="#92400e">Green screen terminals (only internal operators)</text>

    <rect x="30" y="140" width="440" height="60" rx="8" fill="#fff" stroke="#d97706"/>
    <text x="250" y="176" text-anchor="middle" font-size="13" fill="#92400e">Natural programs on mainframe (monolith)</text>

    <rect x="30" y="220" width="440" height="80" rx="8" fill="#fff" stroke="#d97706"/>
    <text x="250" y="250" text-anchor="middle" font-size="13" fill="#92400e">Adabas hierarchical database</text>
    <text x="250" y="272" text-anchor="middle" font-size="11" fill="#b45309">Proprietary format, costly licenses</text>
    <text x="250" y="288" text-anchor="middle" font-size="11" fill="#b45309">Batch only, no real time queries</text>

    <path d="M250,120 L250,138" stroke="#d97706" stroke-width="2"/>
    <path d="M250,200 L250,218" stroke="#d97706" stroke-width="2"/>
  </g>

  <g transform="translate(560,210)">
    <polygon points="0,0 50,20 0,40" fill="#0f172a"/>
    <text x="25" y="65" text-anchor="middle" font-size="12" fill="#475569">modernize</text>
  </g>

  <g transform="translate(660,80)">
    <rect width="500" height="320" rx="12" fill="#dbeafe" stroke="#1e40af" stroke-width="2"/>
    <text x="250" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#1e40af">AFTER: SIFAP modern (2026)</text>

    <rect x="30" y="60" width="210" height="60" rx="8" fill="#fff" stroke="#2563eb"/>
    <text x="135" y="88" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">Next.js 15 web app</text>
    <text x="135" y="104" text-anchor="middle" font-size="11" fill="#1d4ed8">citizens and operators</text>

    <rect x="260" y="60" width="210" height="60" rx="8" fill="#fff" stroke="#2563eb"/>
    <text x="365" y="88" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">Mobile apps and APIs</text>
    <text x="365" y="104" text-anchor="middle" font-size="11" fill="#1d4ed8">partners and channels</text>

    <rect x="30" y="140" width="440" height="60" rx="8" fill="#fff" stroke="#2563eb"/>
    <text x="250" y="168" text-anchor="middle" font-size="13" font-weight="600" fill="#1e40af">Java 21 and Spring Boot 3.3 microservices</text>
    <text x="250" y="186" text-anchor="middle" font-size="11" fill="#1d4ed8">virtual threads, OpenAPI, OAuth2</text>

    <rect x="30" y="220" width="210" height="80" rx="8" fill="#fff" stroke="#2563eb"/>
    <text x="135" y="250" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">PostgreSQL 16</text>
    <text x="135" y="270" text-anchor="middle" font-size="11" fill="#1d4ed8">on Azure Flexible Server</text>
    <text x="135" y="286" text-anchor="middle" font-size="11" fill="#1d4ed8">open source, elastic</text>

    <rect x="260" y="220" width="210" height="80" rx="8" fill="#fff" stroke="#2563eb"/>
    <text x="365" y="250" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">Azure platform</text>
    <text x="365" y="270" text-anchor="middle" font-size="11" fill="#1d4ed8">App Service, Key Vault</text>
    <text x="365" y="286" text-anchor="middle" font-size="11" fill="#1d4ed8">App Insights, ACR</text>

    <path d="M250,120 L250,138" stroke="#2563eb" stroke-width="2"/>
    <path d="M250,200 L250,218" stroke="#2563eb" stroke-width="2"/>
  </g>
</svg>

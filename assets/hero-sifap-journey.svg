<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="legacy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b45309"/>
      <stop offset="1" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="modern" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="pipeline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#b45309"/>
      <stop offset="0.5" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="360" fill="url(#bg)"/>
  <text x="600" y="46" text-anchor="middle" font-size="24" font-weight="700" fill="#e2e8f0">The SIFAP Journey: 30 years of legacy, 1 day to modernize</text>
  <text x="600" y="72" text-anchor="middle" font-size="14" fill="#94a3b8">From Natural/Adabas mainframe to Java 21, Next.js 15, and Azure</text>

  <g transform="translate(80,120)">
    <rect width="280" height="180" rx="14" fill="url(#legacy)"/>
    <text x="140" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#fff8e6">1995 to 2025</text>
    <text x="140" y="60" text-anchor="middle" font-size="13" fill="#fde68a">SIFAP legacy system</text>
    <g font-size="12" fill="#fef3c7" text-anchor="start">
      <text x="22" y="92">Natural programming language</text>
      <text x="22" y="112">Adabas mainframe database</text>
      <text x="22" y="132">No tests, tribal knowledge</text>
      <text x="22" y="152">Expensive licenses, slow change</text>
    </g>
  </g>

  <g transform="translate(380,190)">
    <rect x="0" y="0" width="440" height="40" rx="20" fill="url(#pipeline)"/>
    <text x="220" y="26" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">10 teams, 100 developers, 4 stages, 8 hours</text>
    <polygon points="440,0 470,20 440,40" fill="#0891b2"/>
  </g>

  <g transform="translate(840,120)">
    <rect width="280" height="180" rx="14" fill="url(#modern)"/>
    <text x="140" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#e0f2fe">2026 and beyond</text>
    <text x="140" y="60" text-anchor="middle" font-size="13" fill="#bae6fd">SIFAP modern</text>
    <g font-size="12" fill="#e0f2fe" text-anchor="start">
      <text x="22" y="92">Java 21 and Spring Boot 3.3</text>
      <text x="22" y="112">Next.js 15 and TypeScript</text>
      <text x="22" y="132">PostgreSQL 16 on Azure</text>
      <text x="22" y="152">Tested, observable, scalable</text>
    </g>
  </g>

  <text x="600" y="340" text-anchor="middle" font-size="12" fill="#64748b">Spec Driven Development with GitHub Copilot, Specky, Claude Code, and Azure</text>
</svg>

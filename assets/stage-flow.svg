<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="s1" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#7c3aed"/><stop offset="1" stop-color="#4338ca"/></linearGradient>
    <linearGradient id="s2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2563eb"/><stop offset="1" stop-color="#1e40af"/></linearGradient>
    <linearGradient id="s3" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#059669"/><stop offset="1" stop-color="#065f46"/></linearGradient>
    <linearGradient id="s4" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ea580c"/><stop offset="1" stop-color="#9a3412"/></linearGradient>
  </defs>
  <rect width="1200" height="360" fill="#f8fafc"/>
  <text x="600" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">The 4 stage journey: 8 hours from legacy to modern</text>

  <g transform="translate(40,90)">
    <rect width="260" height="220" rx="14" fill="url(#s1)"/>
    <text x="130" y="38" text-anchor="middle" font-size="13" fill="#c7d2fe" font-weight="600">STAGE 1 / 3 hours</text>
    <text x="130" y="70" text-anchor="middle" font-size="22" font-weight="700" fill="#fff">Archaeology</text>
    <text x="130" y="110" text-anchor="middle" font-size="13" fill="#e0e7ff">Explore SIFAP legacy</text>
    <text x="130" y="130" text-anchor="middle" font-size="13" fill="#e0e7ff">Map dependencies</text>
    <text x="130" y="150" text-anchor="middle" font-size="13" fill="#e0e7ff">Extract business rules</text>
    <text x="130" y="170" text-anchor="middle" font-size="13" fill="#e0e7ff">Find the mysteries</text>
    <text x="130" y="200" text-anchor="middle" font-size="12" fill="#a5b4fc">Copilot Chat and Claude</text>
  </g>

  <g transform="translate(320,90)">
    <rect width="260" height="220" rx="14" fill="url(#s2)"/>
    <text x="130" y="38" text-anchor="middle" font-size="13" fill="#bfdbfe" font-weight="600">STAGE 2 / 2 hours</text>
    <text x="130" y="70" text-anchor="middle" font-size="22" font-weight="700" fill="#fff">Modern spec</text>
    <text x="130" y="110" text-anchor="middle" font-size="13" fill="#dbeafe">Write EARS requirements</text>
    <text x="130" y="130" text-anchor="middle" font-size="13" fill="#dbeafe">Capture ADRs</text>
    <text x="130" y="150" text-anchor="middle" font-size="13" fill="#dbeafe">Design diagrams</text>
    <text x="130" y="170" text-anchor="middle" font-size="13" fill="#dbeafe">Break into tasks</text>
    <text x="130" y="200" text-anchor="middle" font-size="12" fill="#93c5fd">Specky SDD pipeline</text>
  </g>

  <g transform="translate(600,90)">
    <rect width="260" height="220" rx="14" fill="url(#s3)"/>
    <text x="130" y="38" text-anchor="middle" font-size="13" fill="#a7f3d0" font-weight="600">STAGE 3 / 2 hours</text>
    <text x="130" y="70" text-anchor="middle" font-size="22" font-weight="700" fill="#fff">Implementation</text>
    <text x="130" y="110" text-anchor="middle" font-size="13" fill="#d1fae5">Java Spring Boot backend</text>
    <text x="130" y="130" text-anchor="middle" font-size="13" fill="#d1fae5">Next.js frontend</text>
    <text x="130" y="150" text-anchor="middle" font-size="13" fill="#d1fae5">PostgreSQL database</text>
    <text x="130" y="170" text-anchor="middle" font-size="13" fill="#d1fae5">Test and validate</text>
    <text x="130" y="200" text-anchor="middle" font-size="12" fill="#6ee7b7">Copilot Agent and Edits</text>
  </g>

  <g transform="translate(880,90)">
    <rect width="260" height="220" rx="14" fill="url(#s4)"/>
    <text x="130" y="38" text-anchor="middle" font-size="13" fill="#fed7aa" font-weight="600">STAGE 4 / 1 hour</text>
    <text x="130" y="70" text-anchor="middle" font-size="22" font-weight="700" fill="#fff">Evolution</text>
    <text x="130" y="110" text-anchor="middle" font-size="13" fill="#ffedd5">Terraform on Azure</text>
    <text x="130" y="130" text-anchor="middle" font-size="13" fill="#ffedd5">GitHub Actions pipeline</text>
    <text x="130" y="150" text-anchor="middle" font-size="13" fill="#ffedd5">Observability setup</text>
    <text x="130" y="170" text-anchor="middle" font-size="13" fill="#ffedd5">Final demo</text>
    <text x="130" y="200" text-anchor="middle" font-size="12" fill="#fdba74">Platform and DevOps personas</text>
  </g>

  <g fill="#64748b">
    <path d="M300,200 L320,200" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M580,200 L600,200" stroke="#64748b" stroke-width="2"/>
    <path d="M860,200 L880,200" stroke="#64748b" stroke-width="2"/>
  </g>
</svg>
